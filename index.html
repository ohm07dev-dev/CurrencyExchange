  <meta charset="UTF-8">

  <meta property="og:type" content="website">

  <meta property="og:description" content="แปลงค่าเงิน USD, EUR, JPY, GBP, KRW, THB และสกุลยอดนิยมอื่น ๆ พร้อมอัตราแลกเปลี่ยนล่าสุด">
  <meta property="og:site_name" content="ExchangeCurrency">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="ExchangeCurrency | USD to THB Currency Converter">
  <meta name="twitter:description" content="แปลงค่าเงินและดูอัตราแลกเปลี่ยนสำหรับคู่ยอดนิยม เช่น USD to THB, EUR to THB และ JPY to THB">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://flagcdn.com">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G3TTCX0CGZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-G3TTCX0CGZ");
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ExchangeCurrency",
      "url": "https://ohm07dev-dev.github.io/CurrencyExchange/",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "description": "Currency converter for popular exchange rate pairs such as USD to THB, EUR to THB, JPY to THB, GBP to THB, KRW to THB, and THB to USD.",
      "inLanguage": ["th", "en"],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "USD to THB currency conversion",
        "EUR to THB currency conversion",
        "JPY to THB currency conversion",
        "GBP to THB currency conversion",
        "Currency swap",
        "Searchable currency dropdown",
        "Card foreign transaction fee estimate"
      ]
    }
  </script>
</head>
<body>
  <main class="app-shell">
    <section class="converter" aria-labelledby="app-title">
      <div class="converter__topbar">
        <div class="converter__header">
          <p class="eyebrow">Real-time exchange rates</p>
          <h1 id="app-title">ExchangeCurrency</h1>
        </div>

        <label class="theme-toggle" for="theme-toggle" aria-label="Toggle dark mode">
          <input id="theme-toggle" type="checkbox">
          <span class="theme-toggle__track" aria-hidden="true">
            <span class="theme-toggle__thumb"></span>
          </span>
          <span class="theme-toggle__text">Dark</span>
        </label>
      </div>

      <form id="converter-form" class="converter__form">
        <div class="exchange-grid">
          <label class="money-box money-box--input" for="amount-input">
            <span class="money-box__label">จาก</span>
            <div class="money-box__control">
              <div class="money-box__amount">
                <span id="from-symbol" class="currency-symbol" aria-hidden="true">$</span>
                <input id="amount-input" name="amount" type="number" min="0" step="0.01" value="1" inputmode="decimal" required aria-label="จำนวนเงินต้นทาง">
              </div>
              <select id="from-currency" class="native-select" name="from" aria-label="สกุลเงินต้นทาง"></select>
              <div id="from-picker" class="currency-picker"></div>
            </div>
          </label>

          <button class="swap-button" id="swap-button" type="button" aria-label="สลับสกุลเงิน">
            <span aria-hidden="true">⇄</span>
          </button>

          <label class="money-box money-box--output" for="converted-output">
            <span class="money-box__label">เป็น</span>
            <div class="money-box__control">
              <div class="money-box__amount">
                <span id="to-symbol" class="currency-symbol" aria-hidden="true">฿</span>
                <output id="converted-output" class="converted-output" for="amount-input from-currency to-currency">-</output>
              </div>
              <select id="to-currency" class="native-select" name="to" aria-label="สกุลเงินปลายทาง"></select>
              <div id="to-picker" class="currency-picker"></div>
            </div>
          </label>
        </div>
        <section class="fee-panel" aria-label="Calculation options">
          <h2 class="fee-panel__title">Calculation options</h2>
          <div class="fee-panel__controls">
            <label class="fee-toggle" for="fee-enabled" data-tooltip="ประมาณค่าธรรมเนียมบัตรไทยเมื่อจ่ายเป็นสกุลเงินต่างประเทศ หลายบัตรอาจคิดไม่เกิน 2.5%">
              <input id="fee-enabled" type="checkbox">
              <span>Add foreign card fee</span>
            </label>

            <label class="fee-rate is-hidden" id="fee-rate-field" for="fee-rate">
              <span>Fee rate (%)</span>
              <span class="fee-rate__input">
                <input id="fee-rate" type="number" min="0" max="2.5" step="0.1" value="2.5" inputmode="decimal" disabled>
              </span>
            </label>
          </div>
        </section>
      </form>

      <section class="rate-panel" aria-live="polite">
        <p id="rate-info" class="rate-info">เลือกสกุลเงินเพื่อดูอัตราแลกเปลี่ยน</p>
        <p id="status-message" class="status-message" role="status"></p>
      </section>
    </section>
  </main>

  <script defer src="js/app.bundle.js"></script>
</body>
</html>
